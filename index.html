<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock</title>
    <link rel="stylesheet" href="src/style.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
  </head>
  <body>
    <div class="container">
      <h1>World Clock</h1>
      <select name="" id="">
        <option value="">Select a City</option>
        <option value="">Mallorca 🇪🇸</option>
        <option value="">Bankok 🇹🇭</option>
        <option value="">Miami 🇺🇸</option>
      </select>
      <div class="cities" id="nairobi">
        <div>
          <h2>Nairobi 🇰🇪</h2>

          <div class="date" id="date">June 23rd 2026</div>
        </div>
        <div class="time" id="time">12:34:14 <small>PM</small></div>
      </div>
      <div class="cities" id="munich">
        <div>
          <h2>Munich 🇩🇪</h2>

          <div class="date" id="date">June 23rd 2026</div>
        </div>
        <div class="time" id="time">12:34:14 <small>PM</small></div>
      </div>
      <div class="cities" id="maldives">
        <div>
          <h2>Maldives 🇲🇻</h2>

          <div class="date" id="date">June 23rd 2026</div>
        </div>
        <div class="time" id="time">12:34:14 <small>PM</small></div>
      </div>
    </div>
    <footer>
      This project was coded by
      <a href="https://github.com/eve-githu" target="_blank">Eve Githu</a>, is
      open-sourced on
      <a href="https://github.com/eve-githu/world-clock" target="_blank"
        >GitHub</a
      >
      and hosted on
      <a href="https://eveworldclockproject.netlify.app" target="_blank"
        >Netlify</a
      >
    </footer>
    <script src="src/index.js"></script>
  </body>
</html>
